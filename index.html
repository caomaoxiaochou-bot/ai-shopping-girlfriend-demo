<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI购物闺蜜 Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="AI购物闺蜜移动端 Demo">
        <div class="phone">
          <div class="screen-wrap" id="screenWrap">
            <img id="screenImage" alt="点淘 AI 智能体购物页面" />
            <div id="hotspots" class="hotspots" aria-label="页面可点击区域"></div>
          </div>
        </div>
        <nav class="demo-controls" aria-label="Demo 页面控制">
          <button type="button" id="prevScreen">上一页</button>
          <button type="button" id="replayFlow">重播流程</button>
          <button type="button" id="nextScreen">下一页</button>
        </nav>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
